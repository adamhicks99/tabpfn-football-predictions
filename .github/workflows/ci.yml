name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          python-version: "3.12"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --extra dev --locked --no-editable

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Test
        run: .venv/bin/python -m unittest discover -s tests -v

      - name: Build package
        run: uv build

      - name: Scan source
        run: .venv/bin/bandit -r football_lab -ll

      - name: Audit dependencies
        run: >-
          .venv/bin/pip-audit
          --path .venv/lib/python3.12/site-packages
          --progress-spinner off

      - name: Scan committed files for secrets
        run: git ls-files -z | xargs -0 .venv/bin/detect-secrets-hook
